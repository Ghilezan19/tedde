# Nginx reverse proxy config pentru video.scoala-ai.ro -> localhost:8000
# Toate paginile și rutele sunt forward-uite către serverul Python

server {
    listen 80;
    listen [::]:80;
    server_name video.scoala-ai.ro;

    # Mărimea maximă a upload-urilor (pentru snapshots/recordings)
    client_max_body_size 500M;

    # Timeout-uri mari pentru streaming video
    proxy_connect_timeout       300s;
    proxy_send_timeout          300s;
    proxy_read_timeout          300s;
    send_timeout                300s;

    # Buffer settings pentru streaming
    proxy_buffering off;
    proxy_request_buffering off;

    # Logs
    access_log /var/log/nginx/video.scoala-ai.ro.access.log;
    error_log  /var/log/nginx/video.scoala-ai.ro.error.log;

    # Proxy TOATE rutele către backend-ul Python
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Headers pentru a păstra informațiile originale
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # WebSocket support (pentru streaming live)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Cloudflare real IP (dacă vine prin CF)
        set_real_ip_from 173.245.48.0/20;
        set_real_ip_from 103.21.244.0/22;
        set_real_ip_from 103.22.200.0/22;
        set_real_ip_from 103.31.4.0/22;
        set_real_ip_from 141.101.64.0/18;
        set_real_ip_from 108.162.192.0/18;
        set_real_ip_from 190.93.240.0/20;
        set_real_ip_from 188.114.96.0/20;
        set_real_ip_from 197.234.240.0/22;
        set_real_ip_from 198.41.128.0/17;
        set_real_ip_from 162.158.0.0/15;
        set_real_ip_from 104.16.0.0/13;
        set_real_ip_from 104.24.0.0/14;
        set_real_ip_from 172.64.0.0/13;
        set_real_ip_from 131.0.72.0/22;
        real_ip_header CF-Connecting-IP;
    }
}
