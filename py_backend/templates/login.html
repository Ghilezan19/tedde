<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tedde — Autentificare</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #1a1a2e;
      border: 1px solid #2d2d4e;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .logo-area {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-area h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #e94560;
      letter-spacing: 0.05em;
    }

    .logo-area p {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 0.25rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    input[type="password"] {
      width: 100%;
      padding: 0.65rem 0.85rem;
      background: #0f0f1a;
      border: 1px solid #2d2d4e;
      border-radius: 7px;
      color: #e2e8f0;
      font-size: 1rem;
      transition: border-color 0.2s;
      outline: none;
    }

    input[type="password"]:focus {
      border-color: #e94560;
    }

    .error-msg {
      background: rgba(233,69,96,0.12);
      border: 1px solid rgba(233,69,96,0.4);
      color: #f87171;
      border-radius: 7px;
      padding: 0.6rem 0.85rem;
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
    }

    .btn-login {
      width: 100%;
      padding: 0.75rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-login:hover { background: #c73652; }
    .btn-login:active { transform: scale(0.98); }

    .footer-hint {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: #334155;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-area">
      <h1>TEDDE</h1>
      <p>Panou de administrare</p>
    </div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <input type="hidden" name="next" value="{{ next }}">
      <div class="form-group">
        <label for="password">Parolă</label>
        <input type="password" id="password" name="password" autofocus
               placeholder="Introduceți parola" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login">Autentificare</button>
    </form>

    <p class="footer-hint">Tedde Auto Camera System</p>
  </div>
</body>
</html>
